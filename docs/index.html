<!doctype html>

<head>

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8C%8F%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="assets/style.css">
<script>
/* 테마 조기 적용(깜빡임 방지). localStorage 우선, 없으면 시스템 설정. */
(function () {
  try {
    var t = localStorage.getItem("theme");
    if (t !== "dark" && t !== "light") {
      t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    }
    document.documentElement.setAttribute("data-theme", t);
  } catch (e) {}
})();
</script>
</head>

<div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

    <button id="theme-toggle" class="iconbtn" type="button" aria-label="테마 전환" title="테마 전환"></button>
  </div>
</header>

<main class="wrap">

      </div>
    </li>

</main>
